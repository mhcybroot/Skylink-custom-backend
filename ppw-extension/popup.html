<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skylink Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #1F2937;
            --text-muted: #6B7280;
            --error-color: #EF4444;
            --success-color: #10B981;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 100%);
            margin: 0;
            padding: 20px;
            width: 300px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.05);
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            color: var(--primary);
        }
        p.subtitle {
            margin: 0 0 20px 0;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s;
            background: #ffffff;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-family: inherit;
        }
        button:hover {
            background: var(--primary-hover);
        }
        button:active {
            transform: translateY(1px);
        }
        button:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            font-weight: 500;
            min-height: 20px;
        }
        .error { color: var(--error-color); }
        .success { color: var(--success-color); }
        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loggedInState {
            display: none;
            text-align: center;
        }
        .check-icon {
            width: 48px;
            height: 48px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
            font-size: 24px;
        }
        #logoutBtn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid #D1D5DB;
            margin-top: 20px;
        }
        #logoutBtn:hover {
            background: #F3F4F6;
            color: var(--text-color);
        }
        .resources-section {
            margin-top: 20px;
            text-align: left;
            border-top: 1px solid #E5E7EB;
            padding-top: 16px;
        }
        .resource-item {
            background: #ffffff;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .resource-item:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.1);
        }
        .resource-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-color);
            margin: 0 0 4px 0;
        }
        .resource-login {
            font-size: 12px;
            color: var(--text-muted);
            margin: 0;
            display: flex;
            align-items: center;
        }
        .resource-login strong {
            margin-right: 4px;
        }
        .empty-state {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
        }
        /* Status Widget */
        .status-widget {
            background: linear-gradient(135deg, #EEF2FF, #E0E7FF);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(79, 70, 229, 0.15);
        }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-badge.working { background: #D1FAE5; color: #065F46; }
        .status-badge.on-break { background: #FEF3C7; color: #92400E; }
        .status-badge.not-entered { background: #E5E7EB; color: #6B7280; }
        .status-badge.ended { background: #DBEAFE; color: #1E40AF; }
        .countdown-timer {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-color);
            margin: 8px 0 4px;
            font-variant-numeric: tabular-nums;
        }
        .countdown-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin: 0 0 10px;
        }
        .progress-track {
            background: rgba(79, 70, 229, 0.1);
            border-radius: 6px;
            height: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--primary), #818CF8);
            transition: width 0.5s ease;
        }
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: #ffffff;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .stat-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            flex-shrink: 0;
            font-size: 12px;
        }
        .stat-icon.present { background: #E8F5E9; color: #2E7D32; }
        .stat-icon.late { background: #FFF8E1; color: #F57F17; }
        .stat-icon.early { background: #FFEBEE; color: #C62828; }
        .stat-icon.leaves { background: #E1F5FE; color: #0277BD; }
        .stat-info {
            display: flex;
            flex-direction: column;
        }
        .stat-label {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="loginFormState">
            <h2>Skylink Sync</h2>
            <p class="subtitle">Please login to sync PPW data</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username / ID</label>
                    <input type="text" id="username" required placeholder="EMP001">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" id="submitBtn">
                    <span id="btnText">Login</span>
                    <div class="loader" id="loader"></div>
                </button>
                
                <div id="message" class="message"></div>
            </form>
        </div>

        <div id="loggedInState">
            <!-- Status & Shift Countdown Widget -->
            <div class="status-widget" id="statusWidget">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <span style="font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;">⏳ Shift Status</span>
                    <span class="status-badge not-entered" id="statusBadge">Loading...</span>
                </div>
                <div style="text-align: center; font-size: 12px; font-weight: 600; color: var(--primary); margin-top: 8px;" id="serverTimeDisplay">Server Time: --:--:--</div>
                <div class="countdown-timer" id="countdownTimer">--:--:--</div>
                <p class="countdown-sub" id="countdownSub">Connecting to server...</p>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                </div>
            </div>
            
            <!-- Monthly Stats Grid -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon present">✓</div>
                    <div class="stat-info">
                        <span class="stat-label">Present</span>
                        <span class="stat-value" id="statPresent">-</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon late">🕒</div>
                    <div class="stat-info">
                        <span class="stat-label">Late</span>
                        <span class="stat-value" id="statLate">-</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon early">🚪</div>
                    <div class="stat-info">
                        <span class="stat-label">Early Exit</span>
                        <span class="stat-value" id="statEarly">-</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon leaves">🗓️</div>
                    <div class="stat-info">
                        <span class="stat-label">Leaves</span>
                        <span class="stat-value" id="statLeaves">-</span>
                    </div>
                </div>
            </div>

            <div class="resources-section">
                <h3 style="font-size: 14px; margin: 0 0 10px 0; color: var(--text-color);">My Shared Resources</h3>
                <input type="text" id="resourceSearch" placeholder="Search resources..." style="margin-bottom: 12px; font-size: 13px; padding: 8px 12px; display: none;">
                <div id="resourcesLoader" class="loader" style="display: none; border-color: var(--primary); border-bottom-color: transparent;"></div>
                <div id="resourcesList"></div>
            </div>



        </div>

    </div>
    <script src="env.js"></script>
    <script src="popup.js"></script>
</body>
</html>
