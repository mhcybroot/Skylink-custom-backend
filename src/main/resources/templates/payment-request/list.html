<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Payment Requests</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'payment-requests')}">
        <section class="bg-light min-vh-100">
            <div class="container-fluid px-4 md-px-5 py-4">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="mb-0 fw-bold text-dark tracking-tight">Payment Requests</h4>
                        <p class="text-muted small mb-0">Overview of all financial requests and statuses</p>
                    </div>
                    <div>
                        <a th:href="@{/payment-requests/new}" class="btn btn-dark rounded-1 shadow-sm fs-6">
                            <i class="fas fa-plus me-2"></i>New Request
                        </a>
                    </div>
                </div>

                <!-- Main Content Card -->
                <div class="card bg-white border rounded-1 shadow-sm">
                    <div
                        class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                        <h6 class="mb-0 text-uppercase text-secondary fw-bold small ls-1">
                            <i class="fas fa-list me-2"></i> <span th:text="${pageTitle}">All Requests</span>
                        </h6>
                        <!-- Optional: Search/Filter Controls could go here -->
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr class="text-uppercase small text-muted font-monospace"
                                        style="font-size: 0.75rem;">
                                        <th class="ps-4 py-3 border-bottom-0">
                                            <a th:href="@{/payment-requests(view=${param.view}, sortField='id', sortDir=${sortField == 'id' ? reverseSortDir : 'asc'})}"
                                                class="text-decoration-none text-secondary fw-bold">
                                                ID <i class="fas"
                                                    th:classappend="${sortField == 'id'} ? (${sortDir == 'asc'} ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'"></i>
                                            </a>
                                        </th>
                                        <th class="py-3 border-bottom-0">
                                            <a th:href="@{/payment-requests(view=${param.view}, sortField='requestDate', sortDir=${sortField == 'requestDate' ? reverseSortDir : 'asc'})}"
                                                class="text-decoration-none text-secondary fw-bold">
                                                Date <i class="fas"
                                                    th:classappend="${sortField == 'requestDate'} ? (${sortDir == 'asc'} ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'"></i>
                                            </a>
                                        </th>
                                        <th class="py-3 border-bottom-0">
                                            <a th:href="@{/payment-requests(view=${param.view}, sortField='requester', sortDir=${sortField == 'requester' ? reverseSortDir : 'asc'})}"
                                                class="text-decoration-none text-secondary fw-bold">
                                                Requester <i class="fas"
                                                    th:classappend="${sortField == 'requester'} ? (${sortDir == 'asc'} ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'"></i>
                                            </a>
                                        </th>
                                        <th class="py-3 border-bottom-0">
                                            <a th:href="@{/payment-requests(view=${param.view}, sortField='workOrderNumber', sortDir=${sortField == 'workOrderNumber' ? reverseSortDir : 'asc'})}"
                                                class="text-decoration-none text-secondary fw-bold">
                                                WO # <i class="fas"
                                                    th:classappend="${sortField == 'workOrderNumber'} ? (${sortDir == 'asc'} ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'"></i>
                                            </a>
                                        </th>
                                        <th class="py-3 border-bottom-0">
                                            <a th:href="@{/payment-requests(view=${param.view}, sortField='amount', sortDir=${sortField == 'amount' ? reverseSortDir : 'asc'})}"
                                                class="text-decoration-none text-secondary fw-bold">
                                                Amount <i class="fas"
                                                    th:classappend="${sortField == 'amount'} ? (${sortDir == 'asc'} ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'"></i>
                                            </a>
                                        </th>
                                        <th class="py-3 border-bottom-0">
                                            <a th:href="@{/payment-requests(view=${param.view}, sortField='contractorName', sortDir=${sortField == 'contractorName' ? reverseSortDir : 'asc'})}"
                                                class="text-decoration-none text-secondary fw-bold">
                                                Contractor <i class="fas"
                                                    th:classappend="${sortField == 'contractorName'} ? (${sortDir == 'asc'} ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'"></i>
                                            </a>
                                        </th>
                                        <th class="py-3 border-bottom-0">
                                            <a th:href="@{/payment-requests(view=${param.view}, sortField='priority', sortDir=${sortField == 'priority' ? reverseSortDir : 'asc'})}"
                                                class="text-decoration-none text-secondary fw-bold">
                                                Priority <i class="fas"
                                                    th:classappend="${sortField == 'priority'} ? (${sortDir == 'asc'} ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'"></i>
                                            </a>
                                        </th>
                                        <th class="py-3 border-bottom-0">
                                            <a th:href="@{/payment-requests(view=${param.view}, sortField='status', sortDir=${sortField == 'status' ? reverseSortDir : 'asc'})}"
                                                class="text-decoration-none text-secondary fw-bold">
                                                Approval <i class="fas"
                                                    th:classappend="${sortField == 'status'} ? (${sortDir == 'asc'} ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'"></i>
                                            </a>
                                        </th>
                                        <th class="py-3 border-bottom-0">
                                            <a th:href="@{/payment-requests(view=${param.view}, sortField='ppwUpdateStatus', sortDir=${sortField == 'ppwUpdateStatus' ? reverseSortDir : 'asc'})}"
                                                class="text-decoration-none text-secondary fw-bold">
                                                PPW <i class="fas"
                                                    th:classappend="${sortField == 'ppwUpdateStatus'} ? (${sortDir == 'asc'} ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'"></i>
                                            </a>
                                        </th>
                                        <th class="py-3 border-bottom-0">Ref #</th>
                                        <th class="pe-4 py-3 text-end border-bottom-0">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="req : ${requests}" class="border-bottom">
                                        <td class="ps-4">
                                            <span class="font-monospace fw-bold text-dark small"
                                                th:text="${'#' + req.id}"></span>
                                        </td>
                                        <td class="small text-muted" th:text="${req.requestDate}"></td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <div class="avatar-xs bg-light text-secondary rounded-circle d-flex align-items-center justify-content-center me-2 border"
                                                    style="width: 24px; height: 24px;">
                                                    <i class="fas fa-user" style="font-size: 0.65rem;"></i>
                                                </div>
                                                <span class="small fw-medium text-dark"
                                                    th:text="${req.requester != null ? req.requester.username : (req.employeeRequester != null ? req.employeeRequester.name : 'Unknown')}"></span>
                                            </div>
                                        </td>
                                        <td><span class="font-monospace small text-dark"
                                                th:text="${req.workOrderNumber}"></span></td>
                                        <td><span class="font-monospace fw-bold text-dark"
                                                th:text="${'$' + req.amount}"></span></td>
                                        <td><span class="small text-dark text-truncate d-inline-block"
                                                style="max-width: 150px;" th:text="${req.contractorName}"></span></td>
                                        <td>
                                            <span th:text="${req.priority}"
                                                th:class="${'badge rounded-1 fw-normal ' + (req.priority.name() == 'URGENT' ? 'bg-danger-subtle text-danger border border-danger' : (req.priority.name() == 'HOLD' ? 'bg-secondary-subtle text-secondary border border-secondary' : 'bg-success-subtle text-success border border-success'))}">
                                            </span>
                                        </td>
                                        <td>
                                            <span th:text="${req.status}"
                                                th:class="${'badge rounded-1 fw-normal ' + 
                                                (req.status.name() == 'APPROVED' ? 'bg-success-subtle text-success border border-success' : 
                                                (req.status.name() == 'REJECTED' ? 'bg-danger-subtle text-danger border border-danger' : 'bg-warning-subtle text-warning-emphasis border border-warning'))}">
                                            </span>
                                        </td>
                                        <td>
                                            <span th:if="${req.ppwUpdateStatus != null}"
                                                th:text="${req.ppwUpdateStatus}"
                                                th:class="${'badge rounded-1 fw-normal ' + 
                                                (req.ppwUpdateStatus.name() == 'UPDATED' ? 'bg-primary-subtle text-primary border border-primary' : 
                                                (req.ppwUpdateStatus.name() == 'NOT_STARTED' ? 'bg-light text-muted border' : 'bg-info-subtle text-info border border-info'))}">
                                            </span>
                                        </td>
                                        <td class="text-secondary small">
                                            <div class="d-flex align-items-center">
                                                <span class="font-monospace small"
                                                    th:text="${req.paymentReferenceNumber}"></span>
                                                <span th:if="${req.lastEmailSentAt != null}" class="ms-2 text-success"
                                                    title="Invoice Email Sent">
                                                    <i class="fas fa-envelope-check"></i>
                                                </span>
                                            </div>
                                        </td>
                                        <td class="pe-4 text-end">
                                            <a th:href="@{/payment-requests/{id}(id=${req.id})}"
                                                class="btn btn-sm btn-outline-secondary rounded-1 px-3">
                                                View
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(requests)}">
                                        <td colspan="11" class="text-center py-5">
                                            <div class="d-flex flex-column align-items-center">
                                                <div class="bg-light rounded-circle p-3 mb-3">
                                                    <i class="fas fa-inbox fa-2x text-muted opacity-50"></i>
                                                </div>
                                                <h6 class="text-muted fw-bold">No requests found</h6>
                                                <p class="text-muted small mb-0">Get started by creating a new payment
                                                    request.</p>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script>
            // Page specific scripts if needed
        </script>
    </div>
</body>

</html>
