<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Live Monitor Control Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #0ea5e9;
            --accent-blue-hover: #0284c7;
            --accent-red: #ef4444;
            --accent-red-hover: #dc2626;
            --accent-green: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        body {
            background-color: var(--bg-color) !important;
            color: var(--text-main) !important;
            font-family: 'Inter', sans-serif !important;
        }
        
        .monitor-page-wrapper {
            padding: 20px;
            max-width: 1920px;
            margin: 0 auto;
        }

        .header-title {
            font-weight: 600;
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-title::before {
            content: ''; display: inline-block; width: 12px; height: 12px;
            background-color: var(--accent-blue); border-radius: 50%; box-shadow: 0 0 10px var(--accent-blue);
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .top-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .glass-input {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid var(--glass-border) !important;
            color: var(--text-main) !important;
            border-radius: 8px !important;
            padding: 10px 14px !important;
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            outline: none; border-color: var(--accent-blue) !important; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2) !important;
        }
        .glass-input:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-glass {
            padding: 10px 20px; border-radius: 8px; font-weight: 500; border: none; cursor: pointer;
            transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; color: white;
        }
        .btn-glass:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary-glass { background: var(--accent-blue); box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4); }
        .btn-primary-glass:hover:not(:disabled) { background: var(--accent-blue-hover); transform: translateY(-1px); }
        .btn-success-glass { background: var(--accent-green); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .btn-success-glass:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-danger-glass { background: var(--accent-red); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        .btn-danger-glass:hover:not(:disabled) { background: var(--accent-red-hover); transform: translateY(-1px); }

        /* Grid Layout for Streams */
        .stream-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 24px;
        }

        /* Stream Card */
        .stream-card {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stream-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
        }
        
        .stream-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-disconnected .status-dot { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }
        .status-connected .status-dot { background: var(--accent-blue); animation: pulse-blue 1.5s infinite; }
        .status-streaming .status-dot { background: var(--accent-green); animation: pulse-green 1.5s infinite; }

        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(14,165,233,0.7); } 70% { box-shadow: 0 0 0 10px rgba(14,165,233,0); } 100% { box-shadow: 0 0 0 0 rgba(14,165,233,0); } }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); } 70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }

        /* Monitor Viewport (Auto fitting) */
        .monitor-viewport {
            background: #000;
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            aspect-ratio: 16 / 9; /* Ensure a nice ratio even when empty */
        }

        /* Fullscreen Expanded Mode */
        .stream-card.expanded {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            border-radius: 0;
            height: 100vh;
            max-height: none;
            background: var(--bg-color); /* solid bg so nothing bleeds through */
            padding: 24px;
        }
        .stream-card.expanded .monitor-viewport {
            flex: 1;
            overflow: auto;
            align-items: flex-start;
            justify-content: flex-start;
            border-radius: 4px;
        }

        .monitor-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            transform-origin: top left;
        }
        
        .stream-card.expanded .monitor-canvas {
            /* In expanded mode, we drop the 100% constraint so it can scroll if zoomed */
            width: auto;
            height: 100%;
        }

        .no-signal {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            opacity: 0.6;
            animation: float 4s ease-in-out infinite;
        }
        .no-signal svg { width: 48px; height: 48px; margin-bottom: 12px; }
        
        @keyframes float {
            0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); }
        }

        /* Controls */
        .stream-controls {
            display: flex;
            gap: 16px;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 500; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent-blue); cursor: pointer; margin-top: -5px; box-shadow: 0 0 10px rgba(14, 165, 233, 0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
        
        .btn-icon-only { padding: 8px; }
        .remove-btn { background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); border-radius: 6px; cursor: pointer; padding: 4px 8px; transition: 0.2s; }
        .remove-btn:hover { background: var(--accent-red); color: white; }
        
        .expand-btn { background: transparent; border: 1px solid var(--accent-blue); color: var(--accent-blue); border-radius: 6px; cursor: pointer; padding: 4px 8px; transition: 0.2s; margin-right: 8px; }
        .expand-btn:hover { background: var(--accent-blue); color: white; }

        .zoom-controls { display: none; }
        .stream-card.expanded .zoom-controls { display: flex; }

        /* Store initial employee ID from thymeleaf silently */
        #initialEmployeeId { display: none; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="monitor-page-wrapper">
        <div class="header-title">Live Screen Monitor Grid</div>
        
        <div id="initialEmployeeId" th:text="${targetEmployeeId}"></div>

        <!-- Top Control Bar -->
        <div class="glass-panel top-bar">
            <input type="text" id="addEmployeeId" placeholder="Enter Employee ID" class="form-control glass-input" style="width: 250px;">
            <button id="addStreamBtn" class="btn-glass btn-success-glass">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
                Add Stream
            </button>
        </div>

        <!-- Grid Container -->
        <div id="streamGrid" class="stream-grid">
            <!-- Dynamic stream cards will be injected here -->
        </div>
    </div>

    <!-- Template for a Stream Card -->
    <template id="streamCardTemplate">
        <div class="glass-panel stream-card">
            <div class="stream-header">
                <div class="stream-title">
                    <span class="emp-name">Employee ID</span>
                    <div class="status-badge status-disconnected">
                        <div class="status-dot"></div>
                        <span class="status-text">Offline</span>
                    </div>
                </div>
                <div>
                    <button class="expand-btn">Expand</button>
                    <button class="remove-btn">Remove</button>
                </div>
            </div>

            <div class="monitor-viewport">
                <div class="no-signal">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8.25V18a2.25 2.25 0 002.25 2.25h13.5A2.25 2.25 0 0021 18V8.25m-18 0V6a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 6v2.25m-18 0h18M5.25 6h.008v.008H5.25V6zM7.5 6h.008v.008H7.5V6zm2.25 0h.008v.008H9.75V6z" /></svg>
                    <h4 style="margin:0;">AWAITING CONNECTION</h4>
                </div>
                <canvas class="monitor-canvas" width="1920" height="1080"></canvas>
                <div class="active-window-badge" style="position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 6px 12px; border-radius: 6px; font-family: monospace; font-size: 0.85rem; z-index: 10; display: none; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 6px rgba(0,0,0,0.3); max-width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="width: 14px; height: 14px; display: inline; vertical-align: middle; margin-right: 4px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg>
                    <span class="active-window-text" style="vertical-align: middle;">Unknown</span>
                </div>
            </div>

            <div class="stream-controls">
                <div class="control-group">
                    <div class="control-label">Resolution</div>
                    <select class="form-select glass-input res-select">
                        <option value="1280x720">720p (Bandwidth Saver)</option>
                        <option value="1920x1080">1080p (Balanced)</option>
                        <option value="0x0">Max (Full Source)</option>
                    </select>
                </div>
                <div class="control-group">
                    <div class="control-label" style="display:flex; justify-content:space-between;">
                        <span>Quality</span>
                        <span class="quality-val" style="color:var(--accent-blue);">50%</span>
                    </div>
                    <input type="range" class="quality-slider" min="10" max="100" value="50">
                </div>
                <div class="control-group zoom-controls">
                    <div class="control-label" style="display:flex; justify-content:space-between;">
                        <span>Zoom</span>
                        <span class="zoom-val" style="color:var(--accent-blue);">100%</span>
                    </div>
                    <input type="range" class="zoom-slider" min="50" max="400" value="100">
                </div>
                <div class="control-group" style="flex: 0; justify-content: flex-end;">
                    <button class="btn-glass btn-primary-glass screenshot-btn" title="Take Screenshot">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1v6zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2z"/><path d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5zm0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM3 6.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0z"/></svg>
                    </button>
                </div>
                <div class="control-group" style="flex: 2; min-width: 200px;">
                    <div class="control-label">Send Alert</div>
                    <div style="display:flex; gap: 8px;">
                        <input type="text" class="form-control glass-input alert-input" placeholder="Type message..." style="flex:1;">
                        <button class="btn-glass btn-danger-glass alert-btn" title="Send Alert">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script>
        class StreamController {
            constructor(employeeId, gridContainer, template) {
                this.employeeId = employeeId;
                this.ws = null;
                
                // Clone template
                const clone = template.content.cloneNode(true);
                this.card = clone.querySelector('.stream-card');
                
                // Bind UI elements
                this.title = this.card.querySelector('.emp-name');
                this.title.textContent = 'Employee: ' + employeeId;
                
                this.statusBadge = this.card.querySelector('.status-badge');
                this.statusText = this.card.querySelector('.status-text');
                
                this.canvas = this.card.querySelector('.monitor-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.noSignal = this.card.querySelector('.no-signal');
                
                this.activeWindowBadge = this.card.querySelector('.active-window-badge');
                this.activeWindowText = this.card.querySelector('.active-window-text');
                
                this.resSelect = this.card.querySelector('.res-select');
                this.qualitySlider = this.card.querySelector('.quality-slider');
                this.qualityVal = this.card.querySelector('.quality-val');
                this.screenshotBtn = this.card.querySelector('.screenshot-btn');
                this.removeBtn = this.card.querySelector('.remove-btn');
                this.expandBtn = this.card.querySelector('.expand-btn');
                this.zoomSlider = this.card.querySelector('.zoom-slider');
                this.zoomVal = this.card.querySelector('.zoom-val');
                
                // Append to DOM
                gridContainer.appendChild(this.card);
                
                // Event Listeners
                this.resSelect.addEventListener('change', () => this.sendConfig());
                this.qualitySlider.addEventListener('input', () => {
                    this.qualityVal.textContent = this.qualitySlider.value + '%';
                    this.sendConfig();
                });
                
                this.zoomSlider.addEventListener('input', () => {
                    const z = this.zoomSlider.value;
                    this.zoomVal.textContent = z + '%';
                    this.canvas.style.transform = `scale(${z / 100})`;
                });
                
                this.expandBtn.addEventListener('click', () => {
                    this.card.classList.toggle('expanded');
                    if (this.card.classList.contains('expanded')) {
                        this.expandBtn.textContent = 'Collapse';
                        document.body.style.overflow = 'hidden';
                    } else {
                        this.expandBtn.textContent = 'Expand';
                        document.body.style.overflow = '';
                        this.zoomSlider.value = 100;
                        this.zoomVal.textContent = '100%';
                        this.canvas.style.transform = 'scale(1)';
                    }
                });
                
                this.screenshotBtn.addEventListener('click', () => {
                    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                        this.ws.send(JSON.stringify({ type: 'TAKE_SCREENSHOT' }));
                        const icon = this.screenshotBtn.innerHTML;
                        this.screenshotBtn.innerHTML = '...';
                        setTimeout(() => this.screenshotBtn.innerHTML = icon, 1500);
                    }
                });
                
                this.alertInput = this.card.querySelector('.alert-input');
                this.alertBtn = this.card.querySelector('.alert-btn');
                
                this.alertBtn.addEventListener('click', () => {
                    const msg = this.alertInput.value.trim();
                    if (msg && this.ws && this.ws.readyState === WebSocket.OPEN) {
                        this.ws.send(JSON.stringify({ type: 'ALERT', message: msg }));
                        this.alertInput.value = '';
                        
                        const originalText = this.alertBtn.textContent;
                        this.alertBtn.textContent = 'Sent!';
                        setTimeout(() => this.alertBtn.textContent = originalText, 1500);
                    }
                });
                
                this.alertInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') { this.alertBtn.click(); }
                });
                
                this.removeBtn.addEventListener('click', () => {
                    this.disconnect();
                    this.card.remove();
                });
                
                // Start Connection
                this.connect();
            }
            
            setStatus(state, text) {
                this.statusBadge.className = 'status-badge status-' + state;
                this.statusText.textContent = text;
            }
            
            sendConfig() {
                if (!this.ws || this.ws.readyState !== WebSocket.OPEN) return;
                const res = this.resSelect.value.split('x');
                const w = parseInt(res[0]);
                const h = parseInt(res[1]);
                const q = parseInt(this.qualitySlider.value);
                this.ws.send(JSON.stringify({ type: 'SET_CONFIG', width: w, height: h, quality: q }));
            }
            
            connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = protocol + '//' + window.location.host + '/api/v1/monitor/ws?token=admin_' + this.employeeId;
                
                this.ws = new WebSocket(wsUrl);
                this.ws.binaryType = 'arraybuffer';
                
                this.ws.onopen = () => {
                    this.setStatus('connected', 'Buffering...');
                    this.noSignal.style.display = 'none';
                    this.canvas.style.display = 'block';
                    setTimeout(() => this.sendConfig(), 500);
                };
                
                this.ws.onmessage = (event) => {
                    if (typeof event.data === 'string') {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.type === 'ACTIVE_WINDOW') {
                                this.activeWindowBadge.style.display = 'block';
                                this.activeWindowText.textContent = data.title + (data.app ? ' (' + data.app + ')' : '');
                            }
                        } catch (e) {}
                        return;
                    }
                    
                    if (event.data instanceof ArrayBuffer) {
                        const dataView = new Uint8Array(event.data);
                        if (dataView.length === 0) return;
                        
                        const frameType = dataView[0];
                        const imgData = event.data.slice(1);
                        const blob = new Blob([imgData], { type: 'image/jpeg' });
                        const url = URL.createObjectURL(blob);
                        
                        if (frameType === 0x00) {
                            this.setStatus('streaming', 'Live');
                            const img = new Image();
                            img.onload = () => {
                                if (this.canvas.width !== img.width || this.canvas.height !== img.height) {
                                    this.canvas.width = img.width;
                                    this.canvas.height = img.height;
                                }
                                this.ctx.drawImage(img, 0, 0, this.canvas.width, this.canvas.height);
                                URL.revokeObjectURL(url);
                            };
                            img.src = url;
                        } else if (frameType === 0x01) {
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'screenshot_' + this.employeeId + '_' + new Date().getTime() + '.jpg';
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        }
                    }
                };
                
                this.ws.onclose = () => {
                    this.setStatus('disconnected', 'Offline');
                    this.noSignal.style.display = 'flex';
                    this.canvas.style.display = 'none';
                    this.ws = null;
                };
            }
            
            disconnect() {
                if (this.ws) { this.ws.close(); }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const addEmployeeIdInput = document.getElementById('addEmployeeId');
            const addStreamBtn = document.getElementById('addStreamBtn');
            const streamGrid = document.getElementById('streamGrid');
            const template = document.getElementById('streamCardTemplate');
            
            function addStream(empId) {
                if (!empId) return;
                new StreamController(empId, streamGrid, template);
                addEmployeeIdInput.value = '';
            }
            
            addStreamBtn.addEventListener('click', () => {
                addStream(addEmployeeIdInput.value.trim());
            });
            
            addEmployeeIdInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') { addStream(addEmployeeIdInput.value.trim()); }
            });
            
            // Check for initial employee from Thymeleaf route
            const initialId = document.getElementById('initialEmployeeId').textContent.trim();
            if (initialId) {
                addStream(initialId);
            }
        });
    </script>
</div>
</body>
</html>
