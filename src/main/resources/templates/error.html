<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! Something went wrong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: rgba(56, 189, 248, 0.2);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out alternate;
        }
        
        .p1 { width: 300px; height: 300px; left: -50px; top: -50px; background: rgba(56, 189, 248, 0.15); animation-delay: 0s; }
        .p2 { width: 400px; height: 400px; right: -100px; bottom: -100px; background: rgba(168, 85, 247, 0.15); animation-delay: -5s; }
        .p3 { width: 200px; height: 200px; left: 40%; top: 60%; background: rgba(236, 72, 153, 0.15); animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, -50px) scale(0.9); }
        }

        /* Main Content Container */
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem 4rem;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Error Status Glitch Effect */
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
        }

        .error-code::before, .error-code::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }

        .error-code::before {
            left: 2px;
            text-shadow: -2px 0 #38bdf8;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .error-code::after {
            left: -2px;
            text-shadow: 2px 0 #ec4899;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 50% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); }
            60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(5% 0 80% 0); }
        }

        .error-title {
            font-size: 2rem;
            font-weight: 600;
            margin-top: 1rem;
            margin-bottom: 1rem;
            color: #f1f5f9;
        }

        .error-message {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-home {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(139, 92, 246, 0.7);
            color: white;
        }
        
        .btn-home i {
            transition: transform 0.3s ease;
        }
        
        .btn-home:hover i {
            transform: translateX(-4px);
        }

        /* Mouse tracking light effect */
        .mouse-light {
            position: fixed;
            top: 0; left: 0;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="mouse-light" id="mouseLight"></div>

    <div class="particles">
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
    </div>

    <div class="error-container">
        <!-- We use thymeleaf to get the actual HTTP status code, defaulting to 500 if missing -->
        <h1 class="error-code" th:attr="data-text=${status ?: '500'}" th:text="${status ?: '500'}">500</h1>
        
        <h2 class="error-title">
            <span th:if="${status == 403}">Access Denied</span>
            <span th:if="${status == 404}">Page Not Found</span>
            <span th:if="${status != 403 and status != 404}">Oops! Something Went Wrong</span>
        </h2>
        
        <p class="error-message">
            <span th:if="${status == 403}">You do not have permission to access this page. This area is restricted.</span>
            <span th:if="${status == 404}">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</span>
            <span th:if="${status != 403 and status != 404}" th:text="${error ?: 'An unexpected error occurred. Please try again later.'}"></span>
        </p>
        
        <a href="/" class="btn-home">
            <i class="fas fa-arrow-left"></i> Return to Dashboard
        </a>
    </div>

    <script>
        // Interactive mouse light effect
        document.addEventListener('mousemove', (e) => {
            const light = document.getElementById('mouseLight');
            light.style.left = e.clientX + 'px';
            light.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
