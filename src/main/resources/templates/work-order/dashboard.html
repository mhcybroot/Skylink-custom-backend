<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Work Order Dashboard</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'work-orders')}">
        <section>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3><i class="fas fa-chart-line me-2"></i>Work Order Analytics</h3>
                <div>
                    <a href="/admin/work-orders" class="btn btn-outline-secondary btn-sm me-2">
                        <i class="fas fa-list me-1"></i> List View
                    </a>
                    <button class="btn btn-dark btn-sm" onclick="window.print()">
                        <i class="fas fa-print me-1"></i> Print Report
                    </button>
                </div>
            </div>

            <!-- Metric Cards -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card shadow-sm h-100 border-0 border-start border-4 border-primary">
                        <div class="card-body">
                            <div class="text-muted small text-uppercase fw-bold mb-1">Total Work Orders</div>
                            <div class="h2 mb-0 fw-bold text-dark" th:text="${stats.totalWorkOrders}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm h-100 border-0 border-start border-4 border-warning">
                        <div class="card-body">
                            <div class="text-muted small text-uppercase fw-bold mb-1">Open / In Progress</div>
                            <div class="h2 mb-0 fw-bold text-dark" th:text="${stats.openWorkOrders}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm h-100 border-0 border-start border-4 border-success">
                        <div class="card-body">
                            <div class="text-muted small text-uppercase fw-bold mb-1">Total Revenue</div>
                            <div class="h2 mb-0 fw-bold text-success"
                                th:text="${#numbers.formatCurrency(stats.totalRevenue)}">$0.00</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm h-100 border-0 border-start border-4 border-info">
                        <div class="card-body">
                            <div class="text-muted small text-uppercase fw-bold mb-1">Gross Margin</div>
                            <div class="h2 mb-0 fw-bold text-primary"
                                th:text="${#numbers.formatCurrency(stats.totalMargin)}">$0.00</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="row g-4 mb-4">
                <!-- Status Distribution -->
                <div class="col-md-5">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white py-3">
                            <h6 class="mb-0 fw-bold">Status Distribution</h6>
                        </div>
                        <div class="card-body">
                            <canvas id="statusChart" height="250"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Top Contractors -->
                <div class="col-md-7">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white py-3">
                            <h6 class="mb-0 fw-bold">Top 5 Contractors (by Volume)</h6>
                        </div>
                        <div class="card-body">
                            <canvas id="contractorChart" height="250"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Financial Summary Table -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white py-3">
                    <h6 class="mb-0 fw-bold">Financial Summary</h6>
                </div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Category</th>
                                <th class="text-end pe-4">Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="ps-4">Total Client Invoiced (Revenue)</td>
                                <td class="text-end pe-4 fw-bold text-success"
                                    th:text="${#numbers.formatCurrency(stats.totalRevenue)}">$0.00</td>
                            </tr>
                            <tr>
                                <td class="ps-4">Total Contractor Paid (Cost)</td>
                                <td class="text-end pe-4 fw-bold text-danger"
                                    th:text="${#numbers.formatCurrency(stats.totalCost)}">$0.00</td>
                            </tr>
                            <tr class="bg-light">
                                <td class="ps-4 fw-bold">Net Profit / Margin</td>
                                <td class="text-end pe-4 fw-bold text-primary"
                                    th:text="${#numbers.formatCurrency(stats.totalMargin)}">$0.00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </section>
        <script th:inline="javascript">
            /*<![CDATA[*/
            document.addEventListener('DOMContentLoaded', function () {
                // Status Chart
                const statusCtx = document.getElementById('statusChart').getContext('2d');
                const statusDist = /*[[${stats.statusDistribution}]]*/ {};

                const statusLabels = Object.keys(statusDist);
                const statusData = Object.values(statusDist);
                const statusColors = statusLabels.map(s => {
                    if (s === 'Complete') return '#198754';
                    if (s === 'Cancelled') return '#6c757d';
                    return '#ffc107'; // In Progress / Unknown
                });

                new Chart(statusCtx, {
                    type: 'doughnut',
                    data: {
                        labels: statusLabels,
                        datasets: [{
                            data: statusData,
                            backgroundColor: statusColors,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });

                // Contractor Chart
                const contCtx = document.getElementById('contractorChart').getContext('2d');
                const topContractors = /*[[${stats.topContractors}]]*/[];

                const contLabels = topContractors.map(c => c.name);
                const contData = topContractors.map(c => c.count);

                new Chart(contCtx, {
                    type: 'bar',
                    data: {
                        labels: contLabels,
                        datasets: [{
                            label: 'Work Orders',
                            data: contData,
                            backgroundColor: '#0d6efd',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'y',
                        scales: {
                            x: { beginAtZero: true }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            });
            /*]]>*/
        </script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </div>
</body>

</html>
