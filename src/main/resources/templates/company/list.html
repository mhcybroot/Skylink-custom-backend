<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Companies</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'master-data-companies')}">
        <section>
            <div class="container-fluid p-0">
                <h2 class="mb-4 text-gradient-primary fw-bold">Manage Companies (LLCs)</h2>

                <!-- Add Company Card -->
                <div class="card border-0 shadow-lg mb-4">
                    <div class="card-header bg-gradient-primary text-white py-3">
                        <h5 class="mb-0 fw-bold"><i class="fas fa-plus-circle me-2"></i>Add New Company</h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/master-data/companies}" th:object="${newCompany}" method="post"
                            class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-secondary">Company Name</label>
                                <input type="text" th:field="*{name}" class="form-control bg-light border-0" required
                                    placeholder="e.g. Skylink Construction LLC">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small text-secondary">Phone</label>
                                <input type="text" th:field="*{phone}" class="form-control bg-light border-0"
                                    placeholder="e.g. +1 555-0123">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small text-secondary">Email</label>
                                <input type="email" th:field="*{email}" class="form-control bg-light border-0"
                                    placeholder="info@example.com">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-bold small text-secondary">Address (For Invoice)</label>
                                <textarea th:field="*{address}" class="form-control bg-light border-0" rows="1"
                                    placeholder="e.g. 123 Main St, City, State"></textarea>
                            </div>
                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-primary rounded-pill px-4 shadow">
                                    <i class="fas fa-save me-2"></i>Save Company
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Companies List -->
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4 py-3 text-secondary text-uppercase small fw-bold">ID</th>
                                        <th class="py-3 text-secondary text-uppercase small fw-bold">Name</th>
                                        <th class="py-3 text-secondary text-uppercase small fw-bold">Contact</th>
                                        <th class="py-3 text-secondary text-uppercase small fw-bold">Address</th>
                                        <th class="py-3 text-secondary text-uppercase small fw-bold">Status</th>
                                        <th class="pe-4 py-3 text-end text-secondary text-uppercase small fw-bold">
                                            Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="company : ${companies}">
                                        <td class="ps-4 fw-bold text-muted" th:text="${'#' + company.id}"></td>
                                        <td class="fw-bold text-dark" th:text="${company.name}"></td>
                                        <td class="small text-muted">
                                            <div th:text="${company.phone}"></div>
                                            <div th:text="${company.email}" class="text-primary"></div>
                                        </td>
                                        <td class="small text-muted" th:text="${company.address}"></td>
                                        <td>
                                            <span th:if="${company.active}"
                                                class="badge bg-success-soft text-success rounded-pill px-3">Active</span>
                                            <span th:unless="${company.active}"
                                                class="badge bg-danger-soft text-danger rounded-pill px-3">Inactive</span>
                                        </td>
                                        <td class="pe-4 text-end">
                                            <form th:action="@{/master-data/companies/{id}/toggle(id=${company.id})}"
                                                method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm rounded-pill shadow-sm"
                                                    th:classappend="${company.active ? 'btn-outline-danger' : 'btn-outline-success'}"
                                                    th:text="${company.active ? 'Deactivate' : 'Activate'}">
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(companies)}">
                                        <td colspan="5" class="text-center py-5 text-muted">
                                            <i class="fas fa-building fa-3x mb-3 text-secondary opacity-25"></i>
                                            <p>No companies found. Add one above.</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script>
            // Scripts
        </script>
    </div>
</body>

</html>
