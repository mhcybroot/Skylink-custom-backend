<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>All Birthdays</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'birthdays')}">
        <section>
            <style>
                /* Birthday Animations */
                @keyframes bounce {
                    0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
                    40% {transform: translateY(-10px);}
                    60% {transform: translateY(-5px);}
                }
                .bounce-icon {
                    animation: bounce 2s infinite;
                    display: inline-block;
                }
                .birthday-card {
                    background: #fff;
                    transition: transform 0.3s;
                    border-radius: 15px;
                    border: none;
                }
                .birthday-card:hover {
                    transform: translateY(-5px);
                    box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
                }
                @keyframes glow {
                    0% { box-shadow: 0 0 5px rgba(255, 193, 7, 0.3); }
                    50% { box-shadow: 0 0 20px rgba(255, 193, 7, 0.8); }
                    100% { box-shadow: 0 0 5px rgba(255, 193, 7, 0.3); }
                }
                .birthday-today-card {
                    background: linear-gradient(135deg, #fff9e6 0%, #fff2cc 100%);
                    border: 2px solid #ffc107;
                    animation: glow 2s infinite;
                    border-radius: 15px;
                    transition: transform 0.3s;
                }
                .birthday-today-card:hover {
                    transform: scale(1.05);
                }
                .pulse-dot {
                    animation: pulse-dot 2s infinite;
                }
                @keyframes pulse-dot {
                    0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.6); }
                    70% { box-shadow: 0 0 0 8px rgba(220, 53, 69, 0); }
                    100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
                }
            </style>

            <div class="row mb-3 mt-4">
                <div class="col-12">
                    <div class="card shadow-sm border-0" style="background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); border-radius: 20px;">
                        <div class="card-header-custom bg-transparent border-0 pt-4 pb-2 text-center position-relative">
                            <h4 class="fw-bold mb-0 text-dark"><i class="fas fa-birthday-cake text-danger bounce-icon me-2"></i>Company Birthdays</h4>
                            <p class="text-muted small mt-1 mb-0">Let's celebrate together!</p>
                            <a href="/dashboard" class="btn btn-sm btn-outline-secondary position-absolute top-50 start-0 translate-middle-y ms-4 rounded-pill px-3 shadow-sm"><i class="fas fa-arrow-left me-1"></i> Back</a>
                        </div>
                        <div class="card-body">
                            <div class="row justify-content-center g-4">
                                <div class="col-6 col-md-4 col-lg-2" th:each="bday : ${allBirthdays}">
                                    <div class="card h-100 text-center shadow-sm" th:classappend="${bday.isToday} ? 'birthday-today-card' : 'birthday-card'">
                                        <div class="card-body p-3">
                                            <div class="fs-1 mb-2" th:text="${bday.isToday ? '🎂' : '🎉'}">🎉</div>
                                            <h6 class="fw-bold mb-1 text-truncate" th:text="${bday.employeeName}">Name</h6>
                                            <div class="small text-muted mb-2">Turning <span class="fw-bold text-primary" th:text="${bday.turningAge}"></span></div>
                                            <div class="badge rounded-pill px-3 py-2" th:classappend="${bday.isToday} ? 'bg-danger pulse-dot text-white shadow-sm' : 'bg-white text-dark border'" th:text="${bday.isToday ? 'TODAY!' : #temporals.format(bday.nextBirthday, 'MMM d, yyyy')}">Date</div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 text-center text-muted py-4" th:if="${allBirthdays.isEmpty()}">
                                    <i class="fas fa-calendar-times fs-2 mb-2 text-secondary opacity-50"></i>
                                    <p class="mb-0">No upcoming birthdays configured.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script>
            // No custom scripts needed
        </script>
    </div>
</body>

</html>
