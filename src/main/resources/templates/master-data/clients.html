<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Clients</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'master-data-clients')}">
        <section>
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold text-gradient-primary">Manage Clients</h2>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${successMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="card shadow-sm mb-4 border-0">
                        <div class="card-header bg-light border-bottom-0 py-3">
                            <h6 class="mb-0 fw-bold text-primary"><i class="fas fa-plus-circle me-2"></i>Add New Client
                            </h6>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/master-data/clients}" th:object="${newClient}" method="post"
                                class="row g-3 align-items-end">
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold text-secondary">Client Code</label>
                                    <input type="text" class="form-control" th:field="*{code}" required
                                        placeholder="Unique Code">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-secondary">Client Name</label>
                                    <input type="text" class="form-control" th:field="*{name}" required
                                        placeholder="Name">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-bold text-secondary">Address (Optional)</label>
                                    <input type="text" class="form-control" th:field="*{address}" placeholder="Address">
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-1"></i>
                                        Save</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="bg-light text-uppercase small text-secondary">
                                        <tr>
                                            <th class="ps-4">ID</th>
                                            <th>Code</th>
                                            <th>Name</th>
                                            <th>Address</th>
                                            <th>Status</th>
                                            <th class="text-end pe-4">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="c : ${clients}">
                                            <td class="ps-4 fw-bold" th:text="${c.id}"></td>
                                            <td class="fw-bold text-primary" th:text="${c.code}"></td>
                                            <td th:text="${c.name}"></td>
                                            <td th:text="${c.address}"></td>
                                            <td>
                                                <span class="badge bg-success" th:if="${c.active}">Active</span>
                                                <span class="badge bg-secondary" th:unless="${c.active}">Inactive</span>
                                            </td>
                                            <td class="text-end pe-4">
                                                <button type="button"
                                                    class="btn btn-sm btn-link text-decoration-none text-primary me-2"
                                                    th:data-id="${c.id}" th:data-code="${c.code}"
                                                    th:data-name="${c.name}" th:data-address="${c.address}"
                                                    onclick="openEditClientModal(this)">
                                                    <i class="fas fa-edit me-1"></i>Edit
                                                </button>
                                                <form th:action="@{/master-data/clients/{id}/toggle(id=${c.id})}"
                                                    method="post" class="d-inline">
                                                    <button type="submit"
                                                        class="btn btn-sm btn-link text-decoration-none"
                                                        th:classappend="${c.active} ? 'text-danger' : 'text-success'"
                                                        th:title="${c.active} ? 'Deactivate' : 'Activate'">
                                                        <i class="fas"
                                                            th:classappend="${c.active} ? 'fa-trash' : 'fa-undo'"></i>
                                                        <span th:text="${c.active} ? 'Delete' : 'Restore'"
                                                            class="ms-1 small fw-bold"></span>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(clients)}">
                                            <td colspan="5" class="text-center py-4 text-muted">No clients found.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Edit Client Modal -->
                <div class="modal fade" id="editClientModal" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Edit Client</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <form th:action="@{/master-data/clients/update}" method="post">
                                <div class="modal-body">
                                    <input type="hidden" id="editClientId" name="id">
                                    <div class="mb-3">
                                        <label class="form-label">Client Code</label>
                                        <input type="text" class="form-control" id="editClientCode" name="code"
                                            required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Client Name</label>
                                        <input type="text" class="form-control" id="editClientName" name="name"
                                            required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Address</label>
                                        <input type="text" class="form-control" id="editClientAddress" name="address">
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Close</button>
                                    <button type="submit" class="btn btn-primary">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script>
            function openEditClientModal(btn) {
                const id = btn.getAttribute('data-id');
                const code = btn.getAttribute('data-code');
                const name = btn.getAttribute('data-name');
                const address = btn.getAttribute('data-address');

                document.getElementById('editClientId').value = id;
                document.getElementById('editClientCode').value = code;
                document.getElementById('editClientName').value = name;
                document.getElementById('editClientAddress').value = (address && address !== 'null') ? address : '';
                new bootstrap.Modal(document.getElementById('editClientModal')).show();
            }
        </script>
    </div>
</body>

</html>
