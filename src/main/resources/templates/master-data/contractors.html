<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Contractors</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'master-data-contractors')}">
        <section>
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold text-gradient-primary">Manage Contractors</h2>
                    </div>

                    <!-- Success/Error Alerts -->
                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${successMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Add New Card -->
                    <div class="card shadow-sm mb-4 border-0">
                        <div class="card-header bg-light border-bottom-0 py-3">
                            <h6 class="mb-0 fw-bold text-primary"><i class="fas fa-plus-circle me-2"></i>Add New
                                Contractor</h6>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/master-data/contractors}" th:object="${newContractor}" method="post"
                                class="row g-3">
                                <!-- Row 1 -->
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">Contractor Name</label>
                                    <input type="text" class="form-control" th:field="*{name}" required
                                        placeholder="Name">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">Description
                                        (Optional)</label>
                                    <input type="text" class="form-control" th:field="*{description}"
                                        placeholder="Description">
                                </div>

                                <!-- Row 2 -->
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">Default Payment
                                        Method</label>
                                    <select class="form-select" th:field="*{defaultPaymentMethod}">
                                        <option value="">-- Select Method --</option>
                                        <option th:each="pm : ${activePaymentMethods}" th:value="${pm.id}"
                                            th:text="${pm.methodName}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">Account Details
                                        (ID/Link/Number)</label>
                                    <textarea class="form-control" th:field="*{accountDetails}" rows="1"
                                        placeholder="e.g. user@zelle.com, 123456789"></textarea>
                                </div>

                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>
                                        Save Contractor</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- List Card -->
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="bg-light text-uppercase small text-secondary">
                                        <tr>
                                            <th class="ps-4">ID</th>
                                            <th>Name</th>
                                            <th>Description</th>
                                            <th>Payment Method</th>
                                            <th>Account Info</th>
                                            <th>Status</th>
                                            <th class="text-end pe-4" sec:authorize="hasAnyRole('ADMIN', 'HR')">Action
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="c : ${contractors}">
                                            <td class="ps-4 fw-bold" th:text="${c.id}"></td>
                                            <td th:text="${c.name}"></td>
                                            <td th:text="${c.description}"></td>
                                            <td>
                                                <span th:if="${c.defaultPaymentMethod != null}"
                                                    th:text="${c.defaultPaymentMethod.methodName}"
                                                    class="badge bg-info text-dark"></span>
                                                <span th:unless="${c.defaultPaymentMethod != null}"
                                                    class="text-muted small">-</span>
                                            </td>
                                            <td class="small text-muted">
                                                <span th:if="${c.accountDetails != null}"
                                                    th:text="${c.accountDetails}"></span>
                                                <span th:unless="${c.accountDetails != null}">-</span>
                                            </td>
                                            <td>
                                                <span class="badge bg-success" th:if="${c.active}">Active</span>
                                                <span class="badge bg-secondary" th:unless="${c.active}">Inactive</span>
                                            </td>
                                            <td class="text-end pe-4">
                                                <a th:href="@{/master-data/contractors/{id}/dashboard(id=${c.id})}"
                                                    class="btn btn-sm btn-outline-primary me-1" title="Open Dashboard">
                                                    <i class="fas fa-chart-line"></i>
                                                </a>

                                                <span sec:authorize="hasAnyRole('ADMIN', 'HR')">
                                                    <form
                                                        th:action="@{/master-data/contractors/{id}/toggle(id=${c.id})}"
                                                        method="post" class="d-inline">
                                                        <button type="submit"
                                                            class="btn btn-sm btn-link text-decoration-none"
                                                            th:classappend="${c.active} ? 'text-danger' : 'text-success'"
                                                            th:title="${c.active} ? 'Deactivate' : 'Activate'">
                                                            <i class="fas"
                                                                th:classappend="${c.active} ? 'fa-trash' : 'fa-undo'"></i>
                                                        </button>
                                                    </form>
                                                </span>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(contractors)}">
                                            <td colspan="7" class="text-center py-4 text-muted">No contractors found.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Manage Accounts Modal -->
            <div class="modal fade" id="accountsModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Manage Accounts for <span id="modalContractorName"></span></h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <!-- List Existing -->
                            <h6 class="fw-bold small text-secondary">Saved Accounts</h6>
                            <ul class="list-group list-group-flush mb-3" id="accountsList">
                                <li class="list-group-item text-center text-muted">Loading...</li>
                            </ul>

                            <!-- Add New -->
                            <h6 class="fw-bold small text-secondary mt-4">Add New Account</h6>
                            <form id="addAccountForm" onsubmit="addAccount(event)">
                                <input type="hidden" id="modalContractorId">
                                <div class="mb-2">
                                    <select class="form-select form-select-sm" id="modalPaymentMethod" required>
                                        <option value="">Select Method...</option>
                                        <option th:each="pm : ${activePaymentMethods}" th:value="${pm.id}"
                                            th:text="${pm.methodName}"></option>
                                    </select>
                                </div>
                                <div class="mb-2">
                                    <input type="text" class="form-control form-control-sm" id="modalAccountDetails"
                                        placeholder="Account Details (e.g. email, number)" required>
                                </div>
                                <button type="submit" class="btn btn-sm btn-primary w-100">Add Account</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script>
            let currentContractorId = null;
            const csrfToken = document.querySelector("meta[name='_csrf']") ? document.querySelector("meta[name='_csrf']").content : "";
            const csrfHeader = document.querySelector("meta[name='_csrf_header']") ? document.querySelector("meta[name='_csrf_header']").content : "";

            function openAccountsModal(id, name) {
                currentContractorId = id;
                document.getElementById('modalContractorId').value = id;
                document.getElementById('modalContractorName').textContent = name;

                // Clear form
                document.getElementById('modalPaymentMethod').value = "";
                document.getElementById('modalAccountDetails').value = "";

                // Show Modal
                new bootstrap.Modal(document.getElementById('accountsModal')).show();

                loadAccounts(id);
            }

            function loadAccounts(id) {
                const list = document.getElementById('accountsList');
                list.innerHTML = '<li class="list-group-item text-center text-muted">Loading...</li>';

                fetch(`/master-data/api/contractors/${id}/payment-infos`)
                    .then(res => res.json())
                    .then(data => {
                        list.innerHTML = "";
                        if (data.length === 0) {
                            list.innerHTML = '<li class="list-group-item text-center text-muted">No additional accounts found.</li>';
                            return;
                        }
                        data.forEach(info => {
                            const li = document.createElement('li');
                            li.className = "list-group-item d-flex justify-content-between align-items-center";
                            li.innerHTML = `
                                <div>
                                    <span class="badge bg-light text-dark border me-1">${info.paymentMethod.methodName}</span>
                                    <span class="small">${info.accountDetails}</span>
                                </div>
                                <button class="btn btn-xs btn-outline-danger" onclick="deleteAccount(${info.id})">&times;</button>
                            `;
                            list.appendChild(li);
                        });
                    })
                    .catch(err => {
                        console.error(err);
                        list.innerHTML = '<li class="list-group-item text-danger">Error loading accounts.</li>';
                    });
            }

            function addAccount(e) {
                e.preventDefault();
                const methodId = document.getElementById('modalPaymentMethod').value;
                const details = document.getElementById('modalAccountDetails').value;

                // Simple form data approach
                const formData = new FormData();
                formData.append('paymentMethodId', methodId);
                formData.append('accountDetails', details);

                // If CSRF is enabled, headers are needed. 
                // Since this is a simple form post to a backend controller, we can use URLSearchParams for @RequestParam
                const params = new URLSearchParams();
                params.append('paymentMethodId', methodId);
                params.append('accountDetails', details);

                fetch(`/master-data/api/contractors/${currentContractorId}/payment-infos`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        [csrfHeader]: csrfToken
                    },
                    body: params
                })
                    .then(res => {
                        if (res.ok) {
                            loadAccounts(currentContractorId);
                            document.getElementById('modalAccountDetails').value = ""; // Clear input
                        } else {
                            alert("Failed to save.");
                        }
                    });
            }

            function deleteAccount(id) {
                if (!confirm("Delete this account?")) return;

                fetch(`/master-data/api/payment-infos/${id}/delete`, {
                    method: 'POST',
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                })
                    .then(res => {
                        if (res.ok) loadAccounts(currentContractorId);
                        else alert("Failed to delete.");
                    });
            }
        </script>
    </div>
</body>

</html>
