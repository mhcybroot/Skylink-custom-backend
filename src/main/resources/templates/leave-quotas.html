<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Leave Quotas</title>
</head>
<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'leave-quotas')}">
        <section class="container-fluid py-4">
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h3 class="fw-bold mb-1"><i class="fas fa-umbrella-beach text-warning me-2"></i> Employee Leave Quotas</h3>
                        <p class="text-muted mb-0">Overview of annual leave usage across all employees</p>
                    </div>
                    <a href="/dashboard" class="btn btn-outline-secondary rounded-pill shadow-sm"><i class="fas fa-arrow-left me-1"></i> Back to Dashboard</a>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm border-0" style="border-radius: 15px;">
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="border-0 rounded-start">Employee</th>
                                        <th scope="col" class="border-0 text-center">Quota Usage</th>
                                        <th scope="col" class="border-0 text-center">Paid/Unpaid/Absent</th>
                                        <th scope="col" class="border-0 text-center">Breakdown</th>
                                        <th scope="col" class="border-0 text-center rounded-end">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="emp : ${employeeQuotas}">
                                        <td>
                                            <div class="fw-bold text-dark" th:text="${emp.employeeName}">Employee Name</div>
                                        </td>
                                        <td class="text-center" style="min-width: 200px;">
                                            <div class="d-flex justify-content-between align-items-center mb-1">
                                                <small class="text-muted"><span th:text="${emp.yearlyLeavesTaken}"></span> / <span th:text="${emp.annualQuota}"></span> Days</small>
                                                <small class="fw-bold" th:classappend="${emp.usagePercentage >= 100} ? 'text-danger' : 'text-primary'" th:text="${#numbers.formatDecimal(emp.usagePercentage, 1, 1)} + '%'"></small>
                                            </div>
                                            <div class="progress" style="height: 6px;">
                                                <div class="progress-bar" th:classappend="${emp.usagePercentage >= 100} ? 'bg-danger' : 'bg-primary'" role="progressbar"
                                                    th:style="'width: ' + ${emp.usagePercentage > 100 ? 100 : emp.usagePercentage} + '%'"></div>
                                            </div>
                                        </td>
                                        <td class="text-center" style="min-width: 180px;">
                                            <div class="d-flex justify-content-center gap-2 flex-wrap">
                                                <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill" title="Paid Leaves" th:text="'Paid: ' + ${emp.paidLeavesTaken}"></span>
                                                <span class="badge bg-warning-subtle text-warning border border-warning-subtle rounded-pill" title="Unpaid Leaves" th:text="'Unpaid: ' + ${emp.unpaidLeavesTaken}"></span>
                                                <span class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill" title="Absent Days" th:text="'Absent: ' + ${emp.absentDays}"></span>
                                            </div>
                                        </td>
                                        <td class="text-center" style="min-width: 150px;">
                                            <div class="d-flex justify-content-center gap-2 flex-wrap">
                                                <span class="badge bg-info text-dark rounded-pill" title="Sick">Sick: <span th:text="${emp.sickLeavesTaken}"></span></span>
                                                <span class="badge bg-secondary rounded-pill" title="Casual">Casual: <span th:text="${emp.casualLeavesTaken}"></span></span>
                                                <span class="badge bg-light text-dark border rounded-pill" title="Other">Other: <span th:text="${emp.otherLeavesTaken}"></span></span>
                                            </div>
                                        </td>
                                        <td class="text-center">
                                            <a th:href="@{/leave-quotas/employee/{id}(id=${emp.employeeId})}" class="btn btn-sm btn-outline-primary rounded-pill">
                                                View Details
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(employeeQuotas)}">
                                        <td colspan="4" class="text-center text-muted py-4">No employees found.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </section>
        <script>
            // Any specific scripts for this page
        </script>
    </div>
</body>
</html>
