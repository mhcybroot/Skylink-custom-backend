<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Analyst Dashboard</title>
</head>
<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'admin-analyst')}">
        <section>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0 text-gray-800">Processing Sheet: Analyst</h1>
            </div>

            <div class="card shadow mb-4">
                <div class="card-header py-3 d-flex justify-content-between align-items-center">
                    <h6 class="m-0 font-weight-bold text-primary">My Assigned Work Orders</h6>
                    <form method="get" action="/processing-sheet/analyst" class="d-flex align-items-center">
                        <label class="me-2 mb-0 fw-bold text-gray-800">Entry Date:</label>
                        <input type="date" name="date" class="form-control form-control-sm" th:value="${currentDate}" onchange="this.form.submit()">
                    </form>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover" id="dataTable" width="100%" cellspacing="0">
                            <thead>
                                <tr>
                                    <th>WO #</th>
                                    <th>Date Due</th>
                                    <th>Client Code</th>
                                    <th>Category</th>
                                    <th>Address</th>
                                    <th>Status</th>
                                    <th>Late Status</th>
                                    <th>BA FROM (W/O)</th>
                                    <th>BA BY (ANALYST)</th>
                                    <th>BID COUNT</th>
                                    <th>BID AMOUNT</th>
                                    <th>CLIENT INVOICE</th>
                                    <th>CREW INVOICE</th>
                                    <th>NOTES</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="wo : ${workOrders}" th:id="'wo-' + ${wo.woNumber}">
                                    <td class="wo-hover-cell" th:data-wo="${wo.woNumber}" th:text="${wo.woNumber}"></td>
                                    <td th:text="${wo.dateDue}"></td>
                                    <td th:text="${wo.clientCode}"></td>
                                    <td th:text="${wo.category}"></td>
                                    <td class="wo-hover-cell address-hover" th:data-address="${wo.address}" th:text="${wo.address}"></td>
                                    <td class="editable-cell" data-field="status">
                                        <span class="badge bg-secondary status-badge" th:text="${wo.status}"></span>
                                    </td>
                                    <td th:text="${wo.lateStatus}"></td>
                                    <td class="editable-cell" data-field="baFromWo" th:text="${wo.baFromWo}"></td>
                                    <td class="editable-cell" data-field="baByAnalyst" th:text="${wo.baByAnalyst}"></td>
                                    <td class="editable-cell" data-field="bidCount" th:text="${wo.bidCount}"></td>
                                    <td class="editable-cell" data-field="bidAmount" th:text="${wo.bidAmount != null ? '$' + wo.bidAmount : ''}"></td>
                                    <td class="editable-cell" data-field="clientInvoice" th:text="${wo.clientInvoice != null ? '$' + wo.clientInvoice : ''}"></td>
                                    <td class="editable-cell" data-field="crewInvoice" th:text="${wo.crewInvoice != null ? '$' + wo.crewInvoice : ''}"></td>
                                    <td class="editable-cell" data-field="notes" th:text="${wo.notes}"></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(workOrders)}">
                                    <td colspan="14" class="text-center text-muted">No assigned Work Orders found for this date.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', function() {
                const hoverCells = document.querySelectorAll('.wo-hover-cell');
                let hoverTimeout;
                let activePopover = null;
                
                hoverCells.forEach(cell => {
                    cell.addEventListener('mouseenter', function(e) {
                        const woNumber = this.getAttribute('data-wo');
                        const address = this.getAttribute('data-address');
                        const isAddressHover = this.classList.contains('address-hover');
                        const cellRect = this.getBoundingClientRect();
                        
                        // Clear existing timeout
                        clearTimeout(hoverTimeout);
                        
                        hoverTimeout = setTimeout(() => {
                            const fetchUrl = isAddressHover 
                                ? `/processing-sheet/api/address-duplicates?address=${encodeURIComponent(address)}`
                                : `/processing-sheet/api/duplicates?woNumber=${encodeURIComponent(woNumber)}`;
                                
                            fetch(fetchUrl)
                                .then(response => response.json())
                                .then(data => {
                                    // Remove old popover if any
                                    if(activePopover) activePopover.remove();
                                    
                                    if(data && data.length > 1) {
                                        const popover = document.createElement('div');
                                        popover.className = 'duplicate-popover';
                                        
                                        let headerText = isAddressHover ? `Related Work Orders (${data.length})` : `Related Work Orders (${data.length})`;
                                        let html = `<div class="duplicate-popover-header">${headerText}</div>`;
                                        html += `<ul class="duplicate-list">`;
                                        
                                        data.forEach(wo => {
                                            const isCurrent = (isAddressHover && wo.address === address) || (!isAddressHover && wo.woNumber === woNumber);
                                            html += `
                                                <li>
                                                    <a href="/processing-sheet/analyst?date=${wo.entryDate}#wo-${wo.woNumber}"
                                                       style="${isCurrent ? 'font-weight: 700; text-decoration: underline;' : ''}">
                                                       ${wo.woNumber}
                                                    </a>
                                                    <div style="text-align: right;">
                                                        ${isAddressHover ? `<div style="font-size: 0.65rem; color: var(--color-primary); margin-bottom: 2px;">Analyst: <strong>${wo.analyst}</strong></div>` : ''}
                                                        <span class="duplicate-status">${wo.status}</span>
                                                    </div>
                                                </li>
                                            `;
                                        });
                                        
                                        html += `</ul>`;
                                        popover.innerHTML = html;
                                        
                                        // Append to body to avoid clipping
                                        document.body.appendChild(popover);
                                        
                                        // Position it exactly where the cell is
                                        popover.style.top = (cellRect.bottom + window.scrollY) + 'px';
                                        popover.style.left = (cellRect.left + (cellRect.width / 2) + window.scrollX) + 'px';
                                        
                                        // Trigger animation
                                        requestAnimationFrame(() => {
                                            popover.classList.add('show');
                                        });
                                        
                                        activePopover = popover;
                                        
                                        // Close when leaving popover area
                                        popover.addEventListener('mouseleave', () => {
                                            popover.classList.remove('show');
                                            setTimeout(() => popover.remove(), 300);
                                        });
                                        
                                        // Close when leaving cell (but allow moving into popover)
                                        cell.addEventListener('mouseleave', (e) => {
                                            // Check if moving to popover
                                            setTimeout(() => {
                                                if (!popover.matches(':hover')) {
                                                    popover.classList.remove('show');
                                                    setTimeout(() => popover.remove(), 300);
                                                }
                                            }, 100);
                                        }, { once: true });
                                    }
                                });
                        }, 300); // 300ms debounce
                    });
                    
                    cell.addEventListener('mouseleave', function() {
                        clearTimeout(hoverTimeout);
                    });
                });
                
                // Hide popover if clicking anywhere outside
                document.addEventListener('click', function(e) {
                    if (activePopover && !e.target.closest('.duplicate-popover') && !e.target.closest('.wo-hover-cell')) {
                        activePopover.classList.remove('show');
                        setTimeout(() => activePopover.remove(), 300);
                    }
                });
                
                // Scroll into view if hash exists
                if (window.location.hash) {
                    setTimeout(() => {
                        const target = document.querySelector(window.location.hash);
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            target.style.transition = 'background-color 1s ease';
                            target.style.backgroundColor = 'rgba(59, 130, 246, 0.2)';
                            setTimeout(() => {
                                target.style.backgroundColor = '';
                            }, 2000);
                        }
                    }, 100);
                }

                // Inline Editing Logic
                const statusOptions = ['New', 'Submitted', 'Followup', 'WFC', 'In proccess', 'In field', 'Closed', 'Cancelled'];
                const analystOptions = [
                    /*[# th:each="analyst : ${analysts}"]*/
                    { id: [[${analyst.id}]], name: [[${analyst.name}]] },
                    /*[/]*/
                ];
                const editableCells = document.querySelectorAll('.editable-cell');

                editableCells.forEach(cell => {
                    cell.addEventListener('click', function(e) {
                        if (this.querySelector('input') || this.querySelector('select')) return; // Already editing
                        
                        const field = this.getAttribute('data-field');
                        const woNumber = this.closest('tr').getAttribute('id').replace('wo-', '');
                        
                        let currentValue = this.innerText.trim();
                        this.innerHTML = ''; // Clear cell

                        let inputElement;
                        
                        if (field === 'status') {
                            const statuses = ['New', 'Submitted', 'Followup', 'WFC', 'In proccess', 'In field', 'Closed', 'Cancelled'];
                            let selectHtml = `<select class="form-select form-select-sm inline-edit-input">`;
                            statuses.forEach(s => {
                                selectHtml += `<option value="${s}" ${s === currentValue ? 'selected' : ''}>${s}</option>`;
                            });
                            selectHtml += `</select>`;
                            this.innerHTML = selectHtml;
                            inputElement = this.querySelector('select');
                        } else if (field === 'baByAnalyst') {
                            let selectHtml = `<select class="form-select form-select-sm inline-edit-input">`;
                            selectHtml += `<option value="">Select Analyst</option>`;
                            analystOptions.forEach(a => {
                                selectHtml += `<option value="${a.name}" ${a.name === currentValue ? 'selected' : ''}>${a.name}</option>`;
                            });
                            selectHtml += `</select>`;
                            this.innerHTML = selectHtml;
                            inputElement = this.querySelector('select');
                        } else {
                            inputElement = document.createElement('input');
                            inputElement.type = 'text';
                            inputElement.className = 'form-control form-control-sm inline-edit-input';
                            inputElement.value = currentValue;
                        }

                        this.appendChild(inputElement);
                        inputElement.focus();

                        // Save on blur or enter
                        const saveChanges = async () => {
                            const newValue = inputElement.value.trim();
                            
                            // Revert UI optimistically or just show plain text if unchanged
                            if (newValue === currentValue && field !== 'status' && field !== 'baByAnalyst') {
                                this.innerHTML = newValue;
                                return;
                            }

                            // Show saving state
                            this.innerHTML = `<span class="spinner-border spinner-border-sm text-primary" role="status"></span>`;

                            try {
                                const response = await fetch('/processing-sheet/api/update-wo', {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({ woNumber, field, value: newValue })
                                });
                                
                                const result = await response.json();
                                if (result.success) {
                                    // Success animation
                                    if (field === 'status') {
                                        this.innerHTML = `<span class="badge bg-secondary status-badge">${newValue}</span>`;
                                    } else if (['bidAmount', 'clientInvoice', 'crewInvoice'].includes(field)) {
                                        // If user typed 150, show $150. If they typed $150 or empty, keep it.
                                        this.innerHTML = (newValue && !newValue.startsWith('$')) ? '$' + newValue : newValue;
                                    } else {
                                        this.innerHTML = newValue;
                                    }
                                    this.classList.add('edit-success');
                                    setTimeout(() => this.classList.remove('edit-success'), 1000);
                                } else {
                                    // Revert on error
                                    alert('Failed to save: ' + result.message);
                                    if (field === 'status') {
                                        this.innerHTML = `<span class="badge bg-secondary status-badge">${currentValue}</span>`;
                                    } else {
                                        this.innerHTML = currentValue;
                                    }
                                }
                            } catch (err) {
                                alert('Network error occurred.');
                                if (field === 'status') {
                                    this.innerHTML = `<span class="badge bg-secondary status-badge">${currentValue}</span>`;
                                } else {
                                    this.innerHTML = currentValue;
                                }
                            }
                        };

                        inputElement.addEventListener('blur', saveChanges);
                        inputElement.addEventListener('keypress', function(e) {
                            if (e.key === 'Enter') {
                                inputElement.blur();
                            }
                        });
                        if (field === 'status' || field === 'baByAnalyst') {
                            inputElement.addEventListener('change', function(e) {
                                inputElement.blur();
                            });
                        }
                    });
                });
            });
        </script>
    </div>
</body>
</html>
