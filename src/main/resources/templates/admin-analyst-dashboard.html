<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, ~{::scripts}, 'admin-analyst-dashboard')}">

<body>
    <th:block th:fragment="content">
        <div class="container-fluid px-4 py-4">
            
            <!-- Page Header -->
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h2 class="mb-1 text-dark fw-bold" style="letter-spacing: -0.5px;">Processing Dashboard</h2>
                    <p class="text-muted mb-0">Overview of processing sheet metrics and statuses.</p>
                </div>
            </div>

            <!-- Coming Soon State -->
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden" style="min-height: 400px;">
                <div class="card-body d-flex flex-column align-items-center justify-content-center text-center p-5">
                    <div class="bg-primary bg-opacity-10 rounded-circle p-4 mb-4">
                        <i class="fas fa-chart-pie fa-3x text-primary"></i>
                    </div>
                    <h3 class="fw-bold text-dark mb-2">Dashboard Coming Soon</h3>
                    <p class="text-muted mb-4" style="max-width: 500px;">
                        We are currently preparing the analytics and data visualizations for this dashboard. 
                        Soon you will be able to view comprehensive metrics regarding Work Orders and processing statuses.
                    </p>
                    <button class="btn btn-primary rounded-pill px-4 shadow-sm" disabled>
                        <i class="fas fa-magic me-2"></i> Under Construction
                    </button>
                </div>
            </div>

        </div>
    </th:block>

    <th:block th:fragment="scripts">
        <script>
            // Dashboard specific scripts will go here
        </script>
    </th:block>
</body>
</html>
