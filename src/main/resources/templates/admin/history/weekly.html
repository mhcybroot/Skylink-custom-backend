<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Weekly History</title>
</head>

<body>
    <div th:replace="~{layout :: layout(~{::section}, ~{::script}, 'history-weekly')}">
        <section>
            <div class="row mb-4">
                <div class="col-md-6">
                    <h2 class="fw-bold text-gradient-primary">Weekly History</h2>
                    <p class="text-muted">View payment requests for a specific week.</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <form th:action="@{/admin/history/weekly}" method="get"
                        class="d-flex justify-content-md-end align-items-center">
                        <label class="me-2 fw-bold text-secondary">Week Start:</label>
                        <input type="date" name="startDate" class="form-control w-auto d-inline-block shadow-sm"
                            th:value="${startDate}" onchange="this.form.submit()">
                    </form>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm bg-info text-white h-100">
                        <div class="card-body">
                            <h6 class="text-uppercase small opacity-75">Range</h6>
                            <h5 class="fw-bold mb-0">
                                <span th:text="${startDate}"></span> <i class="fas fa-arrow-right mx-2 nice-small"></i>
                                <span th:text="${endDate}"></span>
                            </h5>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-uppercase small text-muted fw-bold">Total Requests</h6>
                            <h3 class="text-dark fw-bold mb-0">
                                <i class="fas fa-file-invoice text-primary me-2"></i>
                                <span th:text="${totalCount}">0</span>
                            </h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-uppercase small text-muted fw-bold">Total Amount</h6>
                            <h3 class="text-success fw-bold mb-0">
                                <i class="fas fa-dollar-sign me-1"></i>
                                <span th:text="${totalAmount}">0.00</span>
                            </h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-uppercase text-secondary small">
                                <tr>
                                    <th class="ps-4">ID</th>
                                    <th>Date</th>
                                    <th>Work Order</th>
                                    <th>Amount</th>
                                    <th>Requester</th>
                                    <th>Contractor</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="req : ${requests}">
                                    <td class="ps-4 fw-bold" th:text="${'#' + req.id}"></td>
                                    <td th:text="${req.requestDate}"></td>
                                    <td th:text="${req.workOrderNumber}"></td>
                                    <td class="fw-bold text-success" th:text="${'$' + req.amount}"></td>
                                    <td
                                        th:text="${req.requester != null ? req.requester.username : (req.employeeRequester != null ? req.employeeRequester.name : 'Unknown')}">
                                    </td>
                                    <td th:text="${req.contractorName}"></td>
                                    <td>
                                        <span th:text="${req.status}"
                                            th:class="${'badge rounded-pill ' + 
                                            (req.status.name() == 'APPROVED' ? 'bg-success' : 
                                            (req.status.name() == 'REJECTED' ? 'bg-danger' : 'bg-warning text-dark'))}">
                                        </span>
                                    </td>
                                    <td>
                                        <a th:href="@{/payment-requests/{id}(id=${req.id})}"
                                            class="btn btn-sm btn-outline-primary rounded-pill">View</a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(requests)}">
                                    <td colspan="8" class="text-center py-4 text-muted">No requests found for this week.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
        <script></script>
    </div>
</body>

</html>
